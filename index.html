<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AofujiTube — 動画アーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yt-bg: #0f0f0f;
  --yt-surface: #212121;
  --yt-surface2: #272727;
  --yt-border: #3f3f3f;
  --yt-red: #ff0000;
  --yt-text: #f1f1f1;
  --yt-text2: #aaaaaa;
  --yt-text3: #717171;
  --yt-hover: rgba(255,255,255,0.08);
}

body {
  font-family: 'Roboto', 'Noto Sans JP', sans-serif;
  background: var(--yt-bg);
  color: var(--yt-text);
  min-height: 100vh;
}

/* ── ヘッダー ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--yt-bg);
  border-bottom: 1px solid var(--yt-border);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  text-decoration: none;
}

.logo-wordmark {
  font-family: 'Roboto', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--yt-text);
  letter-spacing: -0.5px;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 2px;
}

.wm-aofuji { font-weight: 300; color: var(--yt-text); }

.wm-tube {
  background: var(--yt-red);
  color: #fff;
  font-weight: 700;
  padding: 2px 6px 3px;
  border-radius: 4px;
  font-size: 18px;
}

/* 検索 */
.search-area {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search-wrap {
  width: 100%;
  max-width: 500px;
  position: relative;
  display: flex;
}

.search-wrap input {
  flex: 1;
  background: var(--yt-bg);
  border: 1px solid var(--yt-border);
  border-right: none;
  border-radius: 40px 0 0 40px;
  padding: 8px 16px;
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  color: var(--yt-text);
  outline: none;
  height: 40px;
  transition: border-color 0.15s;
}

.search-wrap input::placeholder { color: var(--yt-text3); }
.search-wrap input:focus { border-color: #1c62b9; }

.search-btn {
  width: 56px;
  height: 40px;
  background: var(--yt-surface2);
  border: 1px solid var(--yt-border);
  border-radius: 0 40px 40px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--yt-text);
  flex-shrink: 0;
  transition: background 0.15s;
}

.search-btn:hover { background: #3f3f3f; }

/* サジェスト */
.suggest-box {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 56px;
  background: var(--yt-surface);
  border: 1px solid var(--yt-border);
  border-radius: 12px;
  z-index: 300;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  display: none;
}

.suggest-box.open { display: block; }

.suggest-item {
  padding: 9px 16px;
  font-size: 14px;
  color: var(--yt-text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.1s;
}

.suggest-item:hover, .suggest-item.active { background: var(--yt-hover); }
.suggest-icon { color: var(--yt-text3); flex-shrink: 0; }
.suggest-match { font-weight: 500; color: var(--yt-text); }
.suggest-count { margin-left: auto; font-size: 12px; color: var(--yt-text3); }

/* 統計 */
.header-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.stat-pill {
  background: var(--yt-surface2);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  color: var(--yt-text2);
  white-space: nowrap;
}

.stat-pill strong { color: var(--yt-text); font-weight: 500; }

/* ── フィルタ ── */
.filter-bar {
  background: var(--yt-bg);
  border-bottom: 1px solid var(--yt-border);
  position: sticky;
  top: 56px;
  z-index: 90;
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar { display: none; }

.chip {
  padding: 6px 14px;
  border-radius: 8px;
  font-family: 'Roboto', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  cursor: pointer;
  border: none;
  white-space: nowrap;
  background: #3f3f3f;
  color: var(--yt-text);
  transition: background 0.15s;
  flex-shrink: 0;
}

.chip:hover { background: #4a4a4a; }
.chip.active { background: #f1f1f1; color: #0f0f0f; }

/* ── メイン ── */
main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 16px 16px 60px;
}

.result-info {
  font-size: 13px;
  color: var(--yt-text3);
  margin-bottom: 14px;
}

/* グリッド */
.grid-scroll {
  overflow-x: auto;
}

.grid-table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

.th-corner {
  background: var(--yt-bg);
  border-bottom: 1px solid var(--yt-border);
  border-right: 1px solid var(--yt-border);
  padding: 10px 14px;
  font-size: 12px;
  color: var(--yt-text3);
  font-weight: 400;
  min-width: 170px;
  position: sticky;
  left: 0;
  z-index: 10;
  text-align: left;
  vertical-align: bottom;
}

.th-date {
  background: var(--yt-bg);
  border-bottom: 1px solid var(--yt-border);
  border-right: 1px solid rgba(63,63,63,0.5);
  padding: 8px 6px 10px;
  text-align: center;
  white-space: nowrap;
  min-width: 174px;
  vertical-align: bottom;
}

.th-date-year { font-size: 11px; color: var(--yt-text3); display: block; }
.th-date-md   { font-size: 14px; color: var(--yt-text); font-weight: 500; display: block; margin-top: 2px; }

.td-song {
  background: var(--yt-bg);
  border-bottom: 1px solid rgba(63,63,63,0.4);
  border-right: 1px solid var(--yt-border);
  padding: 8px 14px;
  min-width: 170px;
  max-width: 200px;
  position: sticky;
  left: 0;
  z-index: 5;
  vertical-align: middle;
}

.song-name { font-size: 14px; font-weight: 500; color: var(--yt-text); line-height: 1.3; }

.td-cell {
  border-bottom: 1px solid rgba(63,63,63,0.35);
  border-right: 1px solid rgba(63,63,63,0.35);
  padding: 6px;
  vertical-align: middle;
  text-align: center;
  background: var(--yt-bg);
  min-width: 174px;
}

.td-cell.has-video { cursor: pointer; }
.td-cell.has-video:hover { background: var(--yt-hover); }

.video-card { display: block; text-decoration: none; color: inherit; }

.thumb {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: var(--yt-surface);
  border-radius: 8px;
  overflow: hidden;
}

.thumb img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.15s;
}

.has-video:hover .thumb img { opacity: 0.85; }

.cat-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  margin-top: 5px;
  font-weight: 500;
}

.cat-祭り        { background: rgba(255,60,60,0.18); color: #ff9090; }
.cat-音楽イベント  { background: rgba(60,140,255,0.18); color: #80b8ff; }
.cat-マラソン大会  { background: rgba(50,200,100,0.18); color: #70d896; }
.cat-練習        { background: rgba(180,130,255,0.18); color: #c8a8ff; }
.cat-その他       { background: rgba(160,160,160,0.15); color: #aaaaaa; }

.empty-mark { color: #2a2a2a; font-size: 16px; }

footer {
  border-top: 1px solid var(--yt-border);
  padding: 20px 16px;
  text-align: center;
  font-size: 12px;
  color: var(--yt-text3);
}

@media (max-width: 640px) {
  .header-right { display: none; }
}

/* ── スマホ用カードレイアウト ── */
.mobile-view { display: none; }
.card-list { padding: 0; }

.card-item {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--yt-border);
  text-decoration: none;
  color: inherit;
  transition: background 0.1s;
}

.card-item:hover { background: var(--yt-hover); }

.card-thumb {
  width: 160px;
  flex-shrink: 0;
  position: relative;
  padding-top: 0;
}

.card-thumb-inner {
  width: 160px;
  height: 90px;
  background: var(--yt-surface);
  border-radius: 6px;
  overflow: hidden;
  flex-shrink: 0;
}

.card-thumb-inner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-top: 2px;
}

.card-song {
  font-size: 14px;
  font-weight: 500;
  color: var(--yt-text);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-date {
  font-size: 12px;
  color: var(--yt-text3);
}

.card-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
  align-self: flex-start;
}

/* スマホ: 幅600px以下でカード表示に切り替え */
@media (max-width: 600px) {
  .desktop-view { display: none; }
  .mobile-view  { display: block; }
  .header-right { display: none; }

  header {
    height: 52px;
    padding: 0 12px;
    gap: 10px;
  }

  .logo-wordmark { font-size: 17px; }
  .wm-tube { font-size: 15px; padding: 1px 5px 2px; }

  .search-wrap input {
    height: 36px;
    font-size: 13px;
    padding: 6px 12px;
  }

  .search-btn { width: 44px; height: 36px; }

  .filter-bar {
    top: 52px;
    padding: 8px 12px;
    gap: 6px;
  }

  .chip { font-size: 13px; padding: 5px 12px; }

  main { padding: 8px 0 60px; }

  .result-info { padding: 8px 16px; font-size: 12px; }
}

/* さらに小さい端末（375px以下）*/
@media (max-width: 375px) {
  .card-thumb-inner { width: 120px; height: 68px; }
  .card-thumb { width: 120px; }
  .card-song { font-size: 13px; }
}

</style>
</head>

function ytId(url) {
  const m = url.match(/youtu\.be\/([^?&]+)/) || url.match(/[?&]v=([^&]+)/);
  return m ? m[1] : null;
}

const allSongs = [...new Set(RAW.map(v => v.song))];
let activeCat = 'all', searchQ = '', suggestIndex = -1, suggestItems = [];

function setCategory(btn) {
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function applyFilter() {
  searchQ = document.getElementById('searchInput').value.trim();
  renderGrid();
}

function onSearchInput() {
  suggestIndex = -1;
  searchQ = document.getElementById('searchInput').value.trim();
  renderSuggest(searchQ);
  renderGrid();
}

function renderSuggest(q) {
  const box = document.getElementById('suggestBox');
  if (!q) { box.classList.remove('open'); box.innerHTML = ''; suggestItems = []; return; }
  suggestItems = allSongs.filter(s => s.includes(q));
  if (!suggestItems.length) { box.classList.remove('open'); box.innerHTML = ''; return; }
  const cnt = s => RAW.filter(v => v.song === s).length;
  box.innerHTML = suggestItems.map((s, i) => {
    const hi = s.replace(q, `<span class="suggest-match">${q}</span>`);
    return `<div class="suggest-item" onmousedown="selectSuggest('${s.replace(/'/g,"\\'")}')">
      <svg class="suggest-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <span>${hi}</span>
      <span class="suggest-count">${cnt(s)}件</span>
    </div>`;
  }).join('');
  box.classList.add('open');
}

function selectSuggest(song) {
  document.getElementById('searchInput').value = song;
  searchQ = song;
  document.getElementById('suggestBox').classList.remove('open');
  renderGrid();
}

function showSuggest() { const q = document.getElementById('searchInput').value.trim(); if (q) renderSuggest(q); }
function hideSuggest() { setTimeout(() => document.getElementById('suggestBox').classList.remove('open'), 150); }

function onSearchKeydown(e) {
  const box = document.getElementById('suggestBox');
  const items = box.querySelectorAll('.suggest-item');
  if (!box.classList.contains('open') || !items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); suggestIndex = Math.min(suggestIndex+1, items.length-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); suggestIndex = Math.max(suggestIndex-1, -1); }
  else if (e.key === 'Enter' && suggestIndex >= 0) { e.preventDefault(); selectSuggest(suggestItems[suggestIndex]); return; }
  else if (e.key === 'Escape') { box.classList.remove('open'); return; }
  items.forEach((el, i) => el.classList.toggle('active', i === suggestIndex));
}

function getFiltered() {
  return RAW.filter(v =>
    (activeCat === 'all' || v.cat === activeCat) && (!searchQ || v.song.includes(searchQ))
  );
}

function renderGrid() {
  const filtered = getFiltered();
  const songOrder = [...new Map(RAW.map(v => [v.song, v])).keys()];
  const songs = songOrder.filter(s => filtered.some(v => v.song === s));
  const dates = [...new Set(filtered.map(v => v.date))].sort((a,b) => b.localeCompare(a));
  const vmap = {};
  filtered.forEach(v => { const k = v.song+'|'+v.date; (vmap[k] = vmap[k]||[]).push(v); });

  // thead
  const head = document.getElementById('gridHead');
  head.innerHTML = '';
  const htr = document.createElement('tr');
  const corner = document.createElement('th');
  corner.className = 'th-corner';
  corner.textContent = '演奏曲 / 登録日';
  htr.appendChild(corner);
  dates.forEach(d => {
    const th = document.createElement('th');
    th.className = 'th-date';
    const [y, mo, day] = d.split('-');
    th.innerHTML = `<span class="th-date-year">${y}</span><span class="th-date-md">${+mo}/${+day}</span>`;
    htr.appendChild(th);
  });
  head.appendChild(htr);

  // tbody
  const body = document.getElementById('gridBody');
  body.innerHTML = '';
  songs.forEach(song => {
    const tr = document.createElement('tr');
    const td0 = document.createElement('td');
    td0.className = 'td-song';
    td0.innerHTML = `<span class="song-name">${song}</span>`;
    tr.appendChild(td0);
    dates.forEach(d => {
      const td = document.createElement('td');
      const vs = vmap[song+'|'+d];
      if (vs) {
        td.className = 'td-cell has-video';
        const v = vs[0];
        const id = ytId(v.url);
        const img = id ? `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="${song}" loading="lazy" onerror="this.style.display='none'">` : '';
        td.innerHTML = `<a class="video-card" href="${v.url}" target="_blank" rel="noopener">
          <div class="thumb">${img}</div>
          <span class="cat-badge cat-${v.cat}">${v.cat}</span>
        </a>`;
        if (vs.length > 1) {
          const m = document.createElement('div');
          m.style.cssText = 'font-size:11px;color:#717171;margin-top:3px;';
          m.textContent = `+${vs.length-1} 件`;
          td.appendChild(m);
        }
      } else {
        td.className = 'td-cell';
        td.innerHTML = '<span class="empty-mark">—</span>';
      }
      tr.appendChild(td);
    });
    body.appendChild(tr);
  });

  document.getElementById('statVideos').textContent = filtered.length;
  document.getElementById('statSongs').textContent = songs.length;
  document.getElementById('resultInfo').innerHTML =
    `動画 <strong style="color:#f1f1f1">${filtered.length}</strong> 件 · 楽曲 <strong style="color:#f1f1f1">${songs.length}</strong> 曲`;

  // スマホ用カードリスト
  const cardList = document.getElementById('cardList');
  if (cardList) {
    cardList.innerHTML = filtered
      .slice()
      .sort((a,b) => b.date.localeCompare(a.date))
      .map(v => {
        const id = ytId(v.url);
        const img = id ? `<img src="https://img.youtube.com/vi/${id}/mqdefault.jpg" alt="${v.song}" loading="lazy" onerror="this.style.display='none'">` : '';
        const [y, mo, day] = v.date.split('-');
        return `<a class="card-item" href="${v.url}" target="_blank" rel="noopener">
          <div class="card-thumb-inner">${img}</div>
          <div class="card-info">
            <span class="card-song">${v.song}</span>
            <span class="card-date">${y}年${+mo}月${+day}日</span>
            <span class="card-badge cat-${v.cat}">${v.cat}</span>
          </div>
        </a>`;
      }).join('');
  }
}

renderGrid();
